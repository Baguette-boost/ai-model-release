<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1600" height="1050" fill="#F8FAFC"/>
  <g font-family="Apple SD Gothic Neo, Noto Sans KR, Pretendard, Arial, sans-serif">
    <text x="70" y="76" font-size="34" font-weight="850" fill="#172033" text-anchor="start">IMU Fall Detection: Performance Improvement Cause Analysis</text>
    <text x="70" y="112" font-size="18" font-weight="500" fill="#667085" text-anchor="start">데이터 표현 방식 변화 → 물리 기반 feature 추가 → 시간 문맥 학습 → Recall/F1 중심 평가</text>
    <line x1="70" y1="142" x2="1530" y2="142" stroke="#D8DEE9" stroke-width="2"/>

    <g filter="url(#shadow)"><rect x="70" y="175" width="690" height="265" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/></g>
    <text x="105" y="225" font-size="25" font-weight="850" fill="#172033" text-anchor="start">1. Data Shape Change</text>
    <text x="105" y="265" font-size="19" font-weight="800" fill="#667085" text-anchor="start">전처리 전</text>
    <text x="315" y="265" font-size="19" font-weight="800" fill="#3B82F6" text-anchor="start">전처리 후</text>
    <line x1="105" y1="285" x2="715" y2="285" stroke="#D8DEE9" stroke-width="2"/>
    <text x="105" y="325" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Rows</text>
    <text x="315" y="325" font-size="17" font-weight="800" fill="#667085" text-anchor="start">349,560</text>
    <text x="515" y="325" font-size="17" font-weight="800" fill="#3B82F6" text-anchor="start">349,560</text>
    <text x="105" y="365" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Columns</text>
    <text x="315" y="365" font-size="17" font-weight="800" fill="#667085" text-anchor="start">20</text>
    <text x="515" y="365" font-size="17" font-weight="800" fill="#3B82F6" text-anchor="start">22</text>
    <text x="105" y="405" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Model-ready features</text>
    <text x="315" y="405" font-size="17" font-weight="800" fill="#667085" text-anchor="start">9 / 12</text>
    <text x="515" y="405" font-size="17" font-weight="800" fill="#3B82F6" text-anchor="start">12 / 12</text>
    <text x="810" y="230" font-size="19" font-weight="400" fill="#172033" text-anchor="start">핵심: row 수는 그대로이고, 데이터 양을 임의로 늘린 것이 아니다. 변화의 본질은 원본 IMU 값을</text>
<text x="810" y="260" font-size="19" font-weight="400" fill="#172033" text-anchor="start">모델이 해석하기 쉬운 12차원 feature로 확장한 것이다.</text>

    <line x1="780" y1="305" x2="925" y2="305" stroke="#667085" stroke-width="2.5" marker-end="url(#arrow)"/>
    <g filter="url(#shadow)"><rect x="960" y="175" width="570" height="265" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/></g>
    <text x="1000" y="225" font-size="25" font-weight="850" fill="#172033" text-anchor="start">2. Feature Engineering</text>
    <text x="1000" y="272" font-size="18" font-weight="800" fill="#667085" text-anchor="start">Original 9 features</text>
    <text x="1000" y="307" font-size="18" font-weight="700" fill="#172033" text-anchor="start">roll pitch yaw / ax ay az / wx wy wz</text>
    <text x="1000" y="357" font-size="18" font-weight="800" fill="#3B82F6" text-anchor="start">+ 3 physical features</text>
    <text x="1000" y="392" font-size="20" font-weight="850" fill="#3B82F6" text-anchor="start">accel_norm, gyro_norm, dt_s</text>

    <rect x="70" y="485" width="340" height="150" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/>
<rect x="70" y="485" width="8" height="150" rx="4" fill="#3B82F6" stroke="#3B82F6"/>
<text x="98" y="525" font-size="20" font-weight="800" fill="#172033" text-anchor="start">accel_norm</text>
<text x="98" y="563" font-size="18" font-weight="800" fill="#3B82F6" text-anchor="start">sqrt(ax²+ay²+az²)</text>
<text x="98" y="597" font-size="15" font-weight="400" fill="#667085" text-anchor="start">센서 방향과 무관한 전체 충격 크기</text>
    <rect x="430" y="485" width="340" height="150" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/>
<rect x="430" y="485" width="8" height="150" rx="4" fill="#10B981" stroke="#10B981"/>
<text x="458" y="525" font-size="20" font-weight="800" fill="#172033" text-anchor="start">gyro_norm</text>
<text x="458" y="563" font-size="18" font-weight="800" fill="#10B981" text-anchor="start">sqrt(wx²+wy²+wz²)</text>
<text x="458" y="597" font-size="15" font-weight="400" fill="#667085" text-anchor="start">낙상 순간의 전체 회전량</text>
    <rect x="790" y="485" width="340" height="150" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/>
<rect x="790" y="485" width="8" height="150" rx="4" fill="#F59E0B" stroke="#F59E0B"/>
<text x="818" y="525" font-size="20" font-weight="800" fill="#172033" text-anchor="start">dt_s</text>
<text x="818" y="563" font-size="18" font-weight="800" fill="#F59E0B" text-anchor="start">(tᵢ - tᵢ₋₁) / 1000</text>
<text x="818" y="597" font-size="15" font-weight="400" fill="#667085" text-anchor="start">ICCAS 25Hz와 SisFall 50Hz 차이 보정</text>
    <rect x="1150" y="485" width="340" height="150" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/>
<rect x="1150" y="485" width="8" height="150" rx="4" fill="#8B5CF6" stroke="#8B5CF6"/>
<text x="1178" y="525" font-size="20" font-weight="800" fill="#172033" text-anchor="start">Robust Scaling</text>
<text x="1178" y="563" font-size="18" font-weight="800" fill="#8B5CF6" text-anchor="start">(x - median) / IQR</text>
<text x="1178" y="597" font-size="15" font-weight="400" fill="#667085" text-anchor="start">이상치와 데이터셋 분포 차이에 강함</text>

    <g filter="url(#shadow)"><rect x="70" y="685" width="705" height="285" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/></g>
    <text x="105" y="735" font-size="25" font-weight="850" fill="#172033" text-anchor="start">3. Before vs After Metrics</text>
    <text x="255" y="774" font-size="14" font-weight="800" fill="#667085" text-anchor="start">Before</text>
    <text x="255" y="803" font-size="14" font-weight="800" fill="#3B82F6" text-anchor="start">After</text>
    <text x="105" y="835" font-size="17" font-weight="800" fill="#172033" text-anchor="start">RNN F1</text>
<text x="233" y="835" font-size="14" font-weight="700" fill="#667085" text-anchor="start">0.6022</text>
<rect x="305" y="819" width="245" height="16" rx="5" fill="#EEF2F7" stroke="#EEF2F7"/>
<rect x="305" y="819" width="147" height="16" rx="5" fill="#CBD5E1" stroke="#CBD5E1"/>
<text x="233" y="864" font-size="14" font-weight="700" fill="#3B82F6" text-anchor="start">0.6584</text>
<rect x="305" y="848" width="245" height="16" rx="5" fill="#EEF2F7" stroke="#EEF2F7"/>
<rect x="305" y="848" width="161" height="16" rx="5" fill="#3B82F6" stroke="#3B82F6"/>
<text x="573" y="850" font-size="15" font-weight="800" fill="#10B981" text-anchor="start">+0.0562</text>
    <text x="105" y="905" font-size="17" font-weight="800" fill="#172033" text-anchor="start">Transformer F1</text>
<text x="233" y="905" font-size="14" font-weight="700" fill="#667085" text-anchor="start">0.6663</text>
<rect x="305" y="889" width="245" height="16" rx="5" fill="#EEF2F7" stroke="#EEF2F7"/>
<rect x="305" y="889" width="163" height="16" rx="5" fill="#CBD5E1" stroke="#CBD5E1"/>
<text x="233" y="934" font-size="14" font-weight="700" fill="#8B5CF6" text-anchor="start">0.7273</text>
<rect x="305" y="918" width="245" height="16" rx="5" fill="#EEF2F7" stroke="#EEF2F7"/>
<rect x="305" y="918" width="178" height="16" rx="5" fill="#8B5CF6" stroke="#8B5CF6"/>
<text x="573" y="920" font-size="15" font-weight="800" fill="#10B981" text-anchor="start">+0.0610</text>
    <text x="105" y="955" font-size="16" font-weight="800" fill="#172033" text-anchor="start">Recall improved in 3 of 4 models. F1 improved in 2 of 4 models.</text>

    <g filter="url(#shadow)"><rect x="825" y="685" width="705" height="285" rx="10" fill="#FFFFFF" stroke="#D8DEE9"/></g>
    <text x="860" y="735" font-size="25" font-weight="850" fill="#172033" text-anchor="start">4. Final LSTM Interpretation</text>
    <text x="860" y="785" font-size="17" font-weight="700" fill="#667085" text-anchor="start">Input shape</text>
    <text x="1040" y="785" font-size="20" font-weight="850" fill="#3B82F6" text-anchor="start">50 timesteps × 12 features</text>
    <text x="860" y="830" font-size="17" font-weight="700" fill="#667085" text-anchor="start">Final metrics</text>
    <text x="1040" y="830" font-size="20" font-weight="850" fill="#10B981" text-anchor="start">Accuracy 0.8799 / Recall 0.8863 / F1 0.8677</text>
    <text x="860" y="875" font-size="17" font-weight="700" fill="#667085" text-anchor="start">Threshold</text>
    <text x="1040" y="875" font-size="20" font-weight="850" fill="#F59E0B" text-anchor="start">0.35</text>
    <text x="860" y="925" font-size="17" font-weight="400" fill="#172033" text-anchor="start">정확한 결론: 전처리가 모든 모델을 무조건 향상시킨 것은 아니다. 그러나 물리 기반 feature와 50-step</text>
<text x="860" y="950" font-size="17" font-weight="400" fill="#172033" text-anchor="start">window를 통해 낙상 전후의 충격, 회전, 시간 간격을 LSTM이 학습할 수 있게 만들었다.</text>

    <text x="70" y="1015" font-size="20" font-weight="850" fill="#F43F5E" text-anchor="start">Final claim: 성능 개선의 핵심은 단순 모델 변경이 아니라 데이터 표현 방식의 개선이다.</text>
  </g>
</svg>
