<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="#F8FAFC"/>
  <g font-family="Apple SD Gothic Neo, Noto Sans KR, Pretendard, Arial, sans-serif">
    <text x="64" y="72" font-size="34" font-weight="800" fill="#172033" text-anchor="start">Sector 03. IMU Preprocessing</text>
    <text x="64" y="108" font-size="18" font-weight="400" fill="#667085" text-anchor="start">원본 9개 IMU feature에 물리 기반 feature 3개를 추가한 12차원 입력 구성</text>
    <line x1="64" y1="136" x2="1336" y2="136" stroke="#D8DEE9" stroke-width="2"/>
    <rect x="78" y="165" width="1244" height="640" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<text x="112" y="220" font-size="24" font-weight="800" fill="#172033" text-anchor="start">Input features after preprocessing</text>
<rect x="90" y="190" width="560" height="84" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<text x="124" y="222" font-size="18" font-weight="800" fill="#172033" text-anchor="start">Acceleration magnitude</text>
<text x="124" y="252" font-size="18" font-weight="700" fill="#8B5CF6" text-anchor="start">a_norm = sqrt(ax^2 + ay^2 + az^2)</text>
<text x="720" y="234" font-size="22" font-weight="800" fill="#3B82F6" text-anchor="start">전체 충격 크기</text>
<line x1="660" y1="232" x2="700" y2="232" stroke="#667085" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="90" y="306" width="560" height="84" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<text x="124" y="338" font-size="18" font-weight="800" fill="#172033" text-anchor="start">Gyroscope magnitude</text>
<text x="124" y="368" font-size="18" font-weight="700" fill="#8B5CF6" text-anchor="start">g_norm = sqrt(wx^2 + wy^2 + wz^2)</text>
<text x="720" y="350" font-size="22" font-weight="800" fill="#10B981" text-anchor="start">전체 회전량</text>
<line x1="660" y1="348" x2="700" y2="348" stroke="#667085" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="90" y="422" width="560" height="84" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<text x="124" y="454" font-size="18" font-weight="800" fill="#172033" text-anchor="start">Time interval</text>
<text x="124" y="484" font-size="18" font-weight="700" fill="#8B5CF6" text-anchor="start">dt_s = (t_i - t_{i-1}) / 1000</text>
<text x="720" y="466" font-size="22" font-weight="800" fill="#F59E0B" text-anchor="start">샘플링 차이 보정</text>
<line x1="660" y1="464" x2="700" y2="464" stroke="#667085" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="90" y="538" width="560" height="84" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<text x="124" y="570" font-size="18" font-weight="800" fill="#172033" text-anchor="start">Robust scaling</text>
<text x="124" y="600" font-size="18" font-weight="700" fill="#8B5CF6" text-anchor="start">x&#x27; = (x - median) / IQR</text>
<text x="720" y="582" font-size="22" font-weight="800" fill="#F43F5E" text-anchor="start">이상치에 강한 정규화</text>
<line x1="660" y1="580" x2="700" y2="580" stroke="#667085" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="90" y="654" width="560" height="84" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<text x="124" y="686" font-size="18" font-weight="800" fill="#172033" text-anchor="start">Windowing</text>
<text x="124" y="716" font-size="18" font-weight="700" fill="#8B5CF6" text-anchor="start">X_k in R^(50 x 12)</text>
<text x="720" y="698" font-size="22" font-weight="800" fill="#06B6D4" text-anchor="start">2초 시계열 패턴</text>
<line x1="660" y1="696" x2="700" y2="696" stroke="#667085" stroke-width="2" marker-end="url(#arrow)"/>
<text x="720" y="720" font-size="24" font-weight="800" fill="#172033" text-anchor="start">핵심 어필</text>
<text x="720" y="764" font-size="18" font-weight="400" fill="#667085" text-anchor="start">단순 센서값을 그대로 학습한 것이 아니라, 낙상에서 중요한 충격 크기, 회전량, 시간 간격을 물리</text>
<text x="720" y="792" font-size="18" font-weight="400" fill="#667085" text-anchor="start">기반 feature로 구성하여 LSTM이 시간적 패턴을 학습하도록 만들었다.</text>
  </g>
</svg>
