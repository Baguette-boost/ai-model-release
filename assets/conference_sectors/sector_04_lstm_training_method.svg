<text x="958" y="448" font-size="32" font-weight="800" fill="#8B5CF6" text-anchor="start">Bi-LSTM</text>
<text x="958" y="480" font-size="14" font-weight="400" fill="#667085" text-anchor="start">hidden 64, layers 2,</text>
<text x="958" y="498" font-size="14" font-weight="400" fill="#667085" text-anchor="start">attention pooling</text>
<g filter="url(#shadow)">
<rect x="930" y="540" width="290" height="150" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
