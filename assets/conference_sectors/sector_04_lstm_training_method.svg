    <text x="64" y="108" font-size="18" font-weight="400" fill="#667085" text-anchor="start">50-step sliding window 기반 IMU 낙상 시계열 학습</text>
    <line x1="64" y1="136" x2="1336" y2="136" stroke="#D8DEE9" stroke-width="2"/>
    <g filter="url(#shadow)">
<rect x="930" y="180" width="290" height="150" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
</g>
<rect x="930" y="180" width="8" height="150" rx="4" fill="#3B82F6" stroke="#3B82F6" opacity="1.0"/>
<text x="958" y="222" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Sequence</text>
<text x="958" y="268" font-size="32" font-weight="800" fill="#3B82F6" text-anchor="start">50 x 12</text>
<text x="958" y="300" font-size="14" font-weight="400" fill="#667085" text-anchor="start">50 timesteps, 12 IMU</text>
<text x="958" y="318" font-size="14" font-weight="400" fill="#667085" text-anchor="start">features</text>
