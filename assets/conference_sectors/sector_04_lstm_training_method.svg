<text x="112" y="714" font-size="22" font-weight="800" fill="#172033" text-anchor="start">Training method</text>
<text x="112" y="756" font-size="18" font-weight="400" fill="#667085" text-anchor="start">Group/chronological split로 train, validation, test를 분리하고, 각 window 안에 fall sample이</text>
<text x="112" y="784" font-size="18" font-weight="400" fill="#667085" text-anchor="start">하나라도 있으면 positive sequence로 라벨링했다.</text>
