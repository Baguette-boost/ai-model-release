<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1400" height="900" fill="#F8FAFC"/>
  <g font-family="Apple SD Gothic Neo, Noto Sans KR, Pretendard, Arial, sans-serif">
    <text x="64" y="72" font-size="34" font-weight="800" fill="#172033" text-anchor="start">Sector 08. Professor-Level Final Feedback</text>
    <text x="64" y="108" font-size="18" font-weight="400" fill="#667085" text-anchor="start">학술대회 발표에서 과장 없이 방어 가능한 핵심 피드백</text>
    <line x1="64" y1="136" x2="1336" y2="136" stroke="#D8DEE9" stroke-width="2"/>
    <rect x="78" y="170" width="1245" height="610" rx="8" fill="#FFFFFF" stroke="#D8DEE9" opacity="1.0"/>
<rect x="118" y="193" width="12" height="62" rx="4" fill="#3B82F6" stroke="#3B82F6" opacity="1.0"/>
<text x="150" y="235" font-size="23" font-weight="800" fill="#3B82F6" text-anchor="start">Scope</text>
<text x="390" y="235" font-size="22" font-weight="700" fill="#172033" text-anchor="start">GPS 제외, IMU 낙상 감지로 범위를 명확히 축소</text>
<line x1="150" y1="263" x2="1260" y2="263" stroke="#D8DEE9" stroke-width="2"/>
<rect x="118" y="288" width="12" height="62" rx="4" fill="#8B5CF6" stroke="#8B5CF6" opacity="1.0"/>
<text x="150" y="330" font-size="23" font-weight="800" fill="#8B5CF6" text-anchor="start">Model naming</text>
<text x="390" y="330" font-size="22" font-weight="700" fill="#172033" text-anchor="start">Hybrid 대신 preprocessing-feature LSTM으로 표현</text>
<line x1="150" y1="358" x2="1260" y2="358" stroke="#D8DEE9" stroke-width="2"/>
<rect x="118" y="383" width="12" height="62" rx="4" fill="#F43F5E" stroke="#F43F5E" opacity="1.0"/>
<text x="150" y="425" font-size="23" font-weight="800" fill="#F43F5E" text-anchor="start">Metrics</text>
<text x="390" y="425" font-size="22" font-weight="700" fill="#172033" text-anchor="start">Accuracy보다 Recall/F1 중심으로 해석</text>
<line x1="150" y1="453" x2="1260" y2="453" stroke="#D8DEE9" stroke-width="2"/>
<rect x="118" y="478" width="12" height="62" rx="4" fill="#F59E0B" stroke="#F59E0B" opacity="1.0"/>
<text x="150" y="520" font-size="23" font-weight="800" fill="#F59E0B" text-anchor="start">Data claim</text>
<text x="390" y="520" font-size="22" font-weight="700" fill="#172033" text-anchor="start">ICCAS와 SisFall은 유사점과 차이가 모두 있으므로 과장 금지</text>
<line x1="150" y1="548" x2="1260" y2="548" stroke="#D8DEE9" stroke-width="2"/>
<rect x="118" y="573" width="12" height="62" rx="4" fill="#10B981" stroke="#10B981" opacity="1.0"/>
<text x="150" y="615" font-size="23" font-weight="800" fill="#10B981" text-anchor="start">Preprocessing</text>
<text x="390" y="615" font-size="22" font-weight="700" fill="#172033" text-anchor="start">성능 보장 표현보다 물리 의미 강화로 설명</text>
<line x1="150" y1="643" x2="1260" y2="643" stroke="#D8DEE9" stroke-width="2"/>
<text x="118" y="735" font-size="24" font-weight="800" fill="#172033" text-anchor="start">최종 발표 문장</text>
<text x="118" y="778" font-size="18" font-weight="400" fill="#667085" text-anchor="start">본 연구는 IMU 센서 기반 낙상 감지에 집중하고, 직접 취득 데이터와 공개 낙상 데이터를 병합해 50-step LSTM을 학습하였다. 최종 모델은 Recall 0.8863,</text>
<text x="118" y="806" font-size="18" font-weight="400" fill="#667085" text-anchor="start">F1-score 0.8677을 기록했으며, 낙상 미탐을 줄이는 것을 핵심 평가 기준으로 삼았다.</text>
  </g>
</svg>
